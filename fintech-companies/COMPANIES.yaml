## 📊 分析框架

每家企业分析包含以下维度：

### 1. 公司概况
- 成立时间、总部地点
- 创始人背景
- 融资历史/上市情况
- 最新估值/市值

### 2. 核心业务
- 主要产品/服务
- 目标客户群体
- 收入模式

### 3. 技术创新
- 核心技术壁垒
- AI/大数据应用
- 专利/知识产权

### 4. 市场地位
- 市场份额
- 主要竞争对手
- 竞争优势/劣势

### 5. 财务表现
- 最新营收数据
- 盈利能力
- 增长趋势

### 6. 风险与挑战
- 监管风险
- 市场竞争
- 技术风险

### 7. 老铁洞察
- 对借贷行业的启示
- 可借鉴的经验
- 需要警惕的教训

